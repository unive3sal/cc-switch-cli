name: Rust CI

on:
  push:
    branches:
      - main
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust-ci.yml"
      - ".github/workflows/release.yml"
  pull_request_target:
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust-ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: rustfmt

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fmt-check

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

  failover-e2e:
    name: failover E2E test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: failover-e2e

      - name: Run failover E2E test
        working-directory: src-tauri
        run: |
          sandbox_home="$(mktemp -d)"
          export HOME="$sandbox_home"
          export USERPROFILE="$sandbox_home"
          export CC_SWITCH_CONFIG_DIR="$sandbox_home/.cc-switch"
          cargo test --test proxy_claude_forwarder_alignment proxy_claude_auto_failover_uses_activated_queue_providers -- --exact --nocapture
